[program:tontine-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/tontine-sn/artisan queue:work redis --sleep=3 --tries=3 --timeout=90 --max-jobs=500 --max-time=3600
directory=/var/www/tontine-sn
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/tontine-sn/storage/logs/queue-worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=90
