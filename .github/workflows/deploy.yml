name: Deploy AlwaysData

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            APP_DIR=/home/tontine-sn/tontine-sn-2026

            # Write .env.alwaysdata from GitHub secret
            cat > "$APP_DIR/.env.alwaysdata" << 'ENVEOF'
${{ secrets.ENV_ALWAYSDATA }}
ENVEOF
            echo "=> .env.alwaysdata written from secret"

            cd "$APP_DIR"
            bash deploy/deploy-alwaysdata.sh
